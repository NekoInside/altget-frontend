name: CI/CD Frontend

on:
  push: {}
  pull_request: {}
  workflow_dispatch: {}

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build pow_wasm
        # Install emsdk, compile pow wasm and copy artifacts into frontend sources
        run: |
          set -e
          # clone emsdk if not present
          if [ ! -d "emsdk" ]; then
            git clone https://github.com/emscripten-core/emsdk.git
          fi
          cd emsdk
          ./emsdk install latest
          ./emsdk activate latest
          source ./emsdk_env.sh
          cd ../pow_wasm
          emcc powServiceWasm.c sha256.c -O3 \
            -sEXPORTED_FUNCTIONS=_invokeCustomPow,_free \
            -sEXPORTED_RUNTIME_METHODS=UTF8ToString,allocateUTF8 \
            -o powServiceWasm.js \
            -sMODULARIZE=1 \
            -sEXPORT_NAME=PowServiceWasm \
            -sEXPORT_ES6=1
          mkdir -p ../src/services
          rm -f ../src/services/powServiceWasm.js ../src/services/powServiceWasm.wasm
          cp powServiceWasm.js powServiceWasm.wasm ../src/services/
        shell: bash

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 3

  deploy:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify commit signature
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          verified=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }} --jq '.commit.verification.verified')
          if [[ "$verified" != "true" ]]; then
            echo "❌ Commit ${{ github.sha }} is not verified"
            exit 1
          fi
          echo "✅ Commit ${{ github.sha }} is verified"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Deploy to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "dist"
          target: "/opt/ace/sites/4399/public"
          strip_components: 1

      - name: Fix file ownership
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            chown -R www:www /opt/ace/sites/4399/public
