name: Build

on:
  push: {}
  pull_request: {}
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build pow_wasm
        # Install emsdk, compile pow wasm and copy artifacts into frontend sources
        run: |
          set -e
          # clone emsdk if not present
          if [ ! -d "emsdk" ]; then
            git clone https://github.com/emscripten-core/emsdk.git
          fi
          cd emsdk
          ./emsdk install latest
          ./emsdk activate latest
          source ./emsdk_env.sh
          cd ../pow_wasm
          emcc powServiceWasm.c sha256.c -O3 \
            -sEXPORTED_FUNCTIONS=_invokeCustomPow,_free \
            -sEXPORTED_RUNTIME_METHODS=UTF8ToString,allocateUTF8 \
            -o powServiceWasm.js \
            -sMODULARIZE=1 \
            -sEXPORT_NAME=PowServiceWasm \
            -sEXPORT_ES6=1
          mkdir -p ../src/services
          rm -f ../src/services/powServiceWasm.js ../src/services/powServiceWasm.wasm
          cp powServiceWasm.js powServiceWasm.wasm ../src/services/
        shell: bash

      - name: Set up Node.js 22
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
